services:
  postgres:
    image: postgres:16
    container_name: qth_postgres
    environment:
      POSTGRES_DB: qth_marketplace
      POSTGRES_USER: qth_user
      POSTGRES_PASSWORD: qth_password
    ports:
      - "5432:5432"
    volumes:
      - qth_postgres_data:/var/lib/postgresql/data

volumes:
  qth_postgres_data:
